<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CradleNotes</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --warm-cream: #faf7f2;
            --warm-tan: #f0e8dc;
            --warm-brown: #c4956a;
            --warm-dark: #3d2b1f;
            --warm-mid: #7a5c44;
            --warm-light: #e8ddd2;
            --accent-sage: #8a9e7e;
            --accent-rose: #c4847a;
            --accent-dusty: #9b8ea0;
            --accent-blue: #7aade0;
            --text-primary: #2a1f14;
            --text-secondary: #6b5340;
            --text-muted: #a0896e;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--warm-cream);
            color: var(--text-primary);
            min-height: 100vh;
        }

        header {
            background: var(--warm-dark);
            padding: 24px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        header::before {
            content: '';
            position: absolute;
            top: -40px; right: -40px;
            width: 200px; height: 200px;
            border-radius: 50%;
            background: rgba(196, 149, 106, 0.15);
        }

        .header-left h1 {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            color: var(--warm-tan);
            letter-spacing: 0.5px;
        }

        .header-left p {
            font-size: 12px;
            color: var(--warm-brown);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-top: 2px;
        }

        .header-right { font-size: 13px; color: var(--warm-brown); font-style: italic; }

        .toolbar {
            background: var(--warm-tan);
            padding: 16px 40px;
            display: flex;
            gap: 12px;
            align-items: center;
            border-bottom: 1px solid var(--warm-light);
        }

        .search-wrap { flex: 1; position: relative; }

        .search-wrap input {
            width: 100%;
            padding: 10px 16px 10px 38px;
            background: var(--warm-cream);
            border: 1px solid var(--warm-light);
            border-radius: 30px;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            color: var(--text-primary);
            outline: none;
        }

        .search-wrap input:focus { border-color: var(--warm-brown); }

        .search-wrap::before {
            content: '⌕';
            position: absolute;
            left: 14px; top: 50%;
            transform: translateY(-50%);
            font-size: 16px;
            color: var(--text-muted);
        }

        .btn-new {
            padding: 10px 22px;
            background: var(--warm-dark);
            color: var(--warm-tan);
            border: none;
            border-radius: 30px;
            font-size: 13px;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            white-space: nowrap;
        }

        .btn-new:hover { background: var(--warm-mid); }

        .container {
            display: grid;
            grid-template-columns: 280px 1fr;
            height: calc(100vh - 120px);
        }

        .note-list {
            background: var(--warm-tan);
            border-right: 1px solid var(--warm-light);
            overflow-y: auto;
            padding: 8px 0;
        }

        .note-item {
            padding: 16px 20px;
            cursor: pointer;
            border-bottom: 1px solid rgba(196, 149, 106, 0.15);
            transition: background 0.15s;
            position: relative;
        }

        .note-item:hover { background: rgba(255,255,255,0.4); }

        .note-item.active {
            background: var(--warm-cream);
            border-right: 3px solid var(--warm-brown);
        }

        .note-item h3 {
            font-family: 'Playfair Display', serif;
            font-size: 14px;
            font-weight: 400;
            color: var(--text-primary);
            margin-bottom: 5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .note-item .date { font-size: 11px; color: var(--text-muted); letter-spacing: 0.5px; }
        .note-item .tags { font-size: 11px; color: var(--accent-sage); margin-top: 4px; font-style: italic; }
        .note-item .media-dots { display: flex; gap: 4px; margin-top: 6px; }
        .media-dot { width: 6px; height: 6px; border-radius: 50%; }
        .dot-image    { background: var(--accent-rose); }
        .dot-audio    { background: var(--accent-dusty); }
        .dot-video    { background: var(--accent-sage); }
        .dot-document { background: var(--warm-brown); }
        .dot-link     { background: var(--accent-blue); }

        .note-detail {
            background: var(--warm-cream);
            padding: 40px 50px;
            overflow-y: auto;
        }

        .note-header {
            border-bottom: 1px solid var(--warm-light);
            padding-bottom: 20px;
            margin-bottom: 24px;
        }

        .note-detail h2 {
            font-family: 'Playfair Display', serif;
            font-size: 30px;
            font-weight: 400;
            color: var(--text-primary);
            margin-bottom: 12px;
            line-height: 1.3;
        }

        .note-meta {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            font-size: 12px;
            color: var(--text-muted);
            letter-spacing: 0.5px;
        }

        .tag-pill {
            display: inline-block;
            padding: 3px 10px;
            background: var(--warm-tan);
            color: var(--warm-mid);
            border-radius: 20px;
            font-size: 11px;
            margin: 2px 3px 2px 0;
            font-style: italic;
        }

        .note-body {
            font-size: 15px;
            line-height: 1.9;
            color: var(--text-primary);
            white-space: pre-wrap;
            font-weight: 300;
            margin-bottom: 32px;
        }

        .media-group { margin-top: 24px; }

        .media-group-title {
            font-size: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 10px;
            padding-bottom: 6px;
            border-bottom: 1px solid var(--warm-light);
        }

        .media-image {
            width: 100%;
            max-width: 500px;
            border-radius: 8px;
            border: 1px solid var(--warm-light);
            display: block;
            margin-bottom: 8px;
        }

        .media-audio { width: 100%; max-width: 400px; display: block; margin-bottom: 8px; }

        .media-video {
            width: 100%;
            max-width: 500px;
            border-radius: 8px;
            display: block;
            margin-bottom: 8px;
        }

        .media-card {
            background: var(--warm-tan);
            border: 1px solid var(--warm-light);
            border-radius: 8px;
            padding: 12px 16px;
            margin-bottom: 8px;
            font-size: 12px;
            color: var(--text-secondary);
            word-break: break-all;
        }

        .media-card a { color: #5a8fc4; text-decoration: none; }
        .media-card a:hover { text-decoration: underline; }

        /* ---- NOTE ACTIONS ---- */
        .note-actions {
            display: flex;
            gap: 10px;
            margin-bottom: 28px;
            flex-wrap: wrap;
        }

        .btn-action {
            padding: 7px 16px;
            background: transparent;
            border-radius: 20px;
            font-size: 12px;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            letter-spacing: 0.5px;
            transition: all 0.2s;
        }

        .btn-edit {
            border: 1px solid var(--warm-brown);
            color: var(--warm-brown);
        }

        .btn-edit:hover { background: var(--warm-brown); color: white; }

        .btn-attach {
            border: 1px solid var(--accent-sage);
            color: var(--accent-sage);
        }

        .btn-attach:hover { background: var(--accent-sage); color: white; }

        .btn-delete {
            border: 1px solid var(--accent-rose);
            color: var(--accent-rose);
        }

        .btn-delete:hover { background: var(--accent-rose); color: white; }

        /* ---- EDIT MODE ---- */
        .edit-area {
            width: 100%;
            min-height: 200px;
            padding: 16px;
            background: white;
            border: 1px solid var(--warm-light);
            border-radius: 8px;
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            font-weight: 300;
            color: var(--text-primary);
            line-height: 1.9;
            resize: vertical;
            outline: none;
            margin-bottom: 12px;
        }

        .edit-area:focus { border-color: var(--warm-brown); }

        .edit-actions { display: flex; gap: 10px; margin-bottom: 20px; }

        .btn-save-edit {
            padding: 8px 20px;
            background: var(--warm-dark);
            color: var(--warm-tan);
            border: none;
            border-radius: 20px;
            font-size: 13px;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
        }

        .btn-cancel-edit {
            padding: 8px 16px;
            background: transparent;
            border: 1px solid var(--warm-light);
            color: var(--text-muted);
            border-radius: 20px;
            font-size: 13px;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
        }

        /* ---- ATTACH PROGRESS ---- */
        .attach-status {
            font-size: 12px;
            color: var(--accent-sage);
            font-style: italic;
            margin-top: 4px;
        }

        /* ---- EMPTY STATE ---- */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-muted);
            text-align: center;
        }

        .empty-state .big-letter {
            font-family: 'Playfair Display', serif;
            font-size: 80px;
            color: var(--warm-light);
            line-height: 1;
            margin-bottom: 16px;
        }

        .empty-state h3 {
            font-family: 'Playfair Display', serif;
            font-size: 18px;
            font-weight: 400;
            margin-bottom: 8px;
        }

        .empty-state p { font-size: 13px; font-style: italic; }
        .loading { padding: 30px 20px; text-align: center; color: var(--text-muted); font-style: italic; font-size: 13px; }

        /* ---- MODALS ---- */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(42, 31, 20, 0.5);
            z-index: 100;
            justify-content: center;
            align-items: center;
        }

        .modal-overlay.open { display: flex; }

        .modal {
            background: var(--warm-cream);
            border-radius: 12px;
            padding: 36px;
            width: 520px;
            max-width: 90%;
        }

        .modal h3 {
            font-family: 'Playfair Display', serif;
            font-size: 22px;
            font-weight: 400;
            margin-bottom: 24px;
        }

        .form-group { margin-bottom: 18px; }

        .form-group label {
            display: block;
            font-size: 11px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px 14px;
            background: white;
            border: 1px solid var(--warm-light);
            border-radius: 6px;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            color: var(--text-primary);
            outline: none;
        }

        .form-group input:focus,
        .form-group textarea:focus { border-color: var(--warm-brown); }

        .form-group textarea { height: 140px; resize: vertical; }

        .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 24px; }

        .btn-cancel {
            padding: 10px 20px;
            background: transparent;
            border: 1px solid var(--warm-light);
            color: var(--text-muted);
            border-radius: 20px;
            font-size: 13px;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
        }

        .btn-save {
            padding: 10px 24px;
            background: var(--warm-dark);
            color: var(--warm-tan);
            border: none;
            border-radius: 20px;
            font-size: 13px;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
        }

        .btn-save:hover { background: var(--warm-mid); }

        .divider {
            text-align: center;
            color: var(--warm-light);
            letter-spacing: 8px;
            font-size: 12px;
            margin: 24px 0;
        }

        /* file input hidden */
        #file-input { display: none; }
    </style>
</head>
<body>

<header>
    <div class="header-left">
        <h1>🪴 CradleNotes</h1>
        <p>your personal notes</p>
    </div>
    <div class="header-right" id="note-count"></div>
</header>

<div class="toolbar">
    <div class="search-wrap">
        <input type="text" id="search-input" placeholder="Search your notes..." oninput="filterNotes()">
    </div>
    <button class="btn-new" onclick="openCreateModal()">+ New Note</button>
</div>

<div class="container">
    <div class="note-list" id="note-list">
        <div class="loading">Loading your notes...</div>
    </div>
    <div class="note-detail" id="note-detail">
        <div class="empty-state">
            <div class="big-letter">C</div>
            <h3>Select a note to read</h3>
            <p>Your thoughts, beautifully kept</p>
        </div>
    </div>
</div>

<!-- Hidden file input for media upload -->
<input type="file" id="file-input" accept="image/*,audio/*,video/*,.pdf,.doc,.docx,.txt" onchange="uploadMedia()">

<!-- Create Modal -->
<div class="modal-overlay" id="create-modal">
    <div class="modal">
        <h3>A new note</h3>
        <div class="form-group">
            <label>Title</label>
            <input type="text" id="new-title" placeholder="Give it a name...">
        </div>
        <div class="form-group">
            <label>Content</label>
            <textarea id="new-content" placeholder="Write something..."></textarea>
        </div>
        <div class="modal-actions">
            <button class="btn-cancel" onclick="closeCreateModal()">Cancel</button>
            <button class="btn-save" onclick="createNote()">Save Note</button>
        </div>
    </div>
</div>

<script>
    const API  = 'http://localhost:8080/api/notes';
    const MEDIA = 'http://localhost:8080/api/media';
    let allNotes = [];
    let activeFilename = null;
    let activeNote = null;
    let editMode = false;

    // ---- Load all notes ----
    async function loadNotes() {
        try {
            const res = await fetch(API);
            allNotes = await res.json();
            renderNoteList(allNotes);
            const n = allNotes.length;
            document.getElementById('note-count').textContent =
                n + ' ' + (n === 1 ? 'note' : 'notes');
        } catch (e) {
            document.getElementById('note-list').innerHTML =
                '<div class="loading">Could not connect.<br>Is Spring Boot running?</div>';
        }
    }

    // ---- Render list ----
    function renderNoteList(notes) {
        const list = document.getElementById('note-list');
        if (!notes.length) {
            list.innerHTML = '<div class="loading">No notes yet.</div>';
            return;
        }

        list.innerHTML = notes.map(note => {
            const tags = note.tags ? note.tags.replace(/[\[\]]/g,'').trim() : '';
            const dots = [
                note.image    ? '<div class="media-dot dot-image"></div>'    : '',
                note.audio    ? '<div class="media-dot dot-audio"></div>'    : '',
                note.video    ? '<div class="media-dot dot-video"></div>'    : '',
                note.document ? '<div class="media-dot dot-document"></div>' : '',
                note.link     ? '<div class="media-dot dot-link"></div>'     : '',
            ].filter(Boolean).join('');

            return `
                <div class="note-item ${note.filename === activeFilename ? 'active' : ''}"
                     onclick="openNote('${note.filename}')">
                    <h3>${note.title || note.filename}</h3>
                    <div class="date">${formatDate(note.modified || note.created)}</div>
                    ${tags ? `<div class="tags">${tags}</div>` : ''}
                    ${dots ? `<div class="media-dots">${dots}</div>` : ''}
                </div>
            `;
        }).join('');
    }

    // ---- Open note ----
    async function openNote(filename) {
        activeFilename = filename;
        editMode = false;
        renderNoteList(allNotes);

        try {
            const res = await fetch(`${API}/${filename}`);
            activeNote = await res.json();
            renderNoteDetail(activeNote);
        } catch (e) {
            document.getElementById('note-detail').innerHTML =
                '<div class="empty-state"><h3>Could not load note</h3></div>';
        }
    }

    // ---- Render note detail ----
    function renderNoteDetail(note) {
        const tags = note.tags
            ? note.tags.replace(/[\[\]]/g,'').split(',')
                .filter(t => t.trim())
                .map(t => `<span class="tag-pill">${t.trim()}</span>`)
                .join('')
            : '';

        let mediaHTML = '';

        if (note.image) {
            const url = mediaUrl(note.image, 'image');
            mediaHTML += `<div class="media-group">
                <div class="media-group-title">Image</div>
                <img class="media-image" src="${url}" alt="Attached image"
                     onerror="this.style.display='none'">
            </div>`;
        }
        if (note.audio) {
            const url = mediaUrl(note.audio, 'audio');
            mediaHTML += `<div class="media-group">
                <div class="media-group-title">Audio</div>
                <audio class="media-audio" controls src="${url}"></audio>
            </div>`;
        }
        if (note.video) {
            const url = mediaUrl(note.video, 'video');
            mediaHTML += `<div class="media-group">
                <div class="media-group-title">Video</div>
                <video class="media-video" controls src="${url}"></video>
            </div>`;
        }
        if (note.document) {
            const url = mediaUrl(note.document, 'document');
            const fname = note.document.split('/').pop();
            mediaHTML += `<div class="media-group">
                <div class="media-group-title">Document</div>
                <div class="media-card">
                    <a href="${url}" target="_blank" download="${fname}">📄 ${fname}</a>
                </div>
            </div>`;
        }
        if (note.link) {
            mediaHTML += `<div class="media-group">
                <div class="media-group-title">Link</div>
                <div class="media-card">
                    <a href="${note.link}" target="_blank">${note.link}</a>
                </div>
            </div>`;
        }

        // Body — edit mode or read mode
        const bodyHTML = editMode
            ? `<textarea class="edit-area" id="edit-content">${note.content || ''}</textarea>
               <div class="edit-actions">
                   <button class="btn-save-edit" onclick="saveEdit()">Save changes</button>
                   <button class="btn-cancel-edit" onclick="cancelEdit()">Cancel</button>
               </div>`
            : `<div class="note-body">${note.content || ''}</div>`;

        document.getElementById('note-detail').innerHTML = `
            <div class="note-actions">
                <button class="btn-action btn-edit" onclick="startEdit()">Edit</button>
                <button class="btn-action btn-attach" onclick="triggerFileUpload()">Attach media</button>
                <button class="btn-action btn-delete" onclick="deleteNote('${note.filename}')">Delete</button>
            </div>
            <div id="attach-status" class="attach-status"></div>
            <div class="note-header">
                <h2>${note.title || note.filename}</h2>
                <div class="note-meta">
                    <span>Created ${formatDate(note.created)}</span>
                    ${note.modified ? `<span>Edited ${formatDate(note.modified)}</span>` : ''}
                    ${note.author ? `<span>${note.author}</span>` : ''}
                </div>
                ${tags ? `<div style="margin-top:12px">${tags}</div>` : ''}
            </div>
            ${bodyHTML}
            ${mediaHTML ? `<div class="divider">· · ·</div>${mediaHTML}` : ''}
        `;
    }

    // ---- Edit ----
    function startEdit() {
        editMode = true;
        renderNoteDetail(activeNote);
        document.getElementById('edit-content').focus();
    }

    function cancelEdit() {
        editMode = false;
        renderNoteDetail(activeNote);
    }

    async function saveEdit() {
        const newContent = document.getElementById('edit-content').value;

        try {
            await fetch(`${API}/${activeFilename}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ content: newContent })
            });
            editMode = false;
            await openNote(activeFilename);
            await loadNotes();
        } catch (e) {
            alert('Error saving: ' + e.message);
        }
    }

    // ---- Attach media ----
    function triggerFileUpload() {
        document.getElementById('file-input').click();
    }

    async function uploadMedia() {
        const fileInput = document.getElementById('file-input');
        const file = fileInput.files[0];
        if (!file || !activeFilename) return;

        const status = document.getElementById('attach-status');
        status.textContent = 'Uploading ' + file.name + '...';

        const formData = new FormData();
        formData.append('file', file);

        try {
            const res = await fetch(`${API}/${activeFilename}/attach`, {
                method: 'POST',
                body: formData
            });
            const data = await res.json();
            status.textContent = 'Attached: ' + data.filename;
            fileInput.value = '';
            await openNote(activeFilename);
            await loadNotes();
        } catch (e) {
            status.textContent = 'Error: ' + e.message;
        }
    }

    // ---- Create ----
    function openCreateModal() {
        document.getElementById('create-modal').classList.add('open');
        setTimeout(() => document.getElementById('new-title').focus(), 100);
    }

    function closeCreateModal() {
        document.getElementById('create-modal').classList.remove('open');
        document.getElementById('new-title').value = '';
        document.getElementById('new-content').value = '';
    }

    async function createNote() {
        const title   = document.getElementById('new-title').value.trim();
        const content = document.getElementById('new-content').value.trim();
        if (!title) { alert('Please enter a title.'); return; }

        try {
            const res = await fetch(API, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ title, content })
            });
            const data = await res.json();
            closeCreateModal();
            await loadNotes();
            openNote(data.filename);
        } catch (e) {
            alert('Error: ' + e.message);
        }
    }

    // ---- Delete ----
    async function deleteNote(filename) {
        if (!confirm('Delete this note?')) return;
        try {
            await fetch(`${API}/${filename}`, { method: 'DELETE' });
            activeFilename = null;
            activeNote = null;
            document.getElementById('note-detail').innerHTML = `
                <div class="empty-state">
                    <div class="big-letter">·</div>
                    <h3>Note deleted</h3>
                </div>`;
            await loadNotes();
        } catch (e) {
            alert('Error: ' + e.message);
        }
    }

    // ---- Search ----
    function filterNotes() {
        const q = document.getElementById('search-input').value.toLowerCase();
        renderNoteList(allNotes.filter(n =>
            (n.title || '').toLowerCase().includes(q) ||
            (n.tags  || '').toLowerCase().includes(q)
        ));
    }

    // ---- Helpers ----
    function mediaUrl(filePath, type) {
        if (!filePath) return null;
        const filename = filePath.split('/').pop();
        return `${MEDIA}/${type}/${filename}`;
    }

    function formatDate(str) {
        if (!str) return '';
        try {
            return new Date(str).toLocaleDateString('en-US',
                { month: 'long', day: 'numeric', year: 'numeric' });
        } catch { return str; }
    }

    loadNotes();
</script>
</body>
</html>
